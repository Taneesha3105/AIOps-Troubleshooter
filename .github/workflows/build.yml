name: aiops-pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aiops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build
        id: build
        run: |
          mvn clean package > build.log 2>&1
        continue-on-error: true

      - name: Install Python Dependencies (Build)
        if: steps.build.outcome == 'failure'
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Gemini Build Analysis
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/analyze_build.py

      - name: Deploy to Render
        id: deploy
        if: steps.build.outcome == 'success'
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" > deploy.log 2>&1
        continue-on-error: true

      - name: Install Python Dependencies (Deploy)
        if: steps.deploy.outcome == 'failure'
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Gemini Deploy Analysis
        if: steps.deploy.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/analyze_deploy.py

      - name: Check Pipeline Status
        if: always()
        run: |
          echo "Build Outcome: ${{ steps.build.outcome }}"
          echo "Deploy Outcome: ${{ steps.deploy.outcome }}"

          if [ "${{ steps.build.outcome }}" = "failure" ] || [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            echo "Pipeline failed due to build/deploy errors."
            exit 1
          fi

          echo "Pipeline completed successfully."

name: AIOps Troubleshooter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aiops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        id: build
        run: |
          mvn clean package > build.log 2>&1
        continue-on-error: true

      - name: Gemini Build Analysis
        if: always()
        run: |
          python scripts/gemini_build_analysis.py

      - name: Deploy to Render
        id: deploy
        if: steps.build.outcome == 'success'
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" > deploy.log 2>&1
        continue-on-error: true

      - name: Gemini Deploy Analysis
        if: always()
        run: |
          python scripts/gemini_deploy_analysis.py

      - name: Check Pipeline Status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ] || [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            echo "Pipeline failed due to build/deploy errors."
            exit 1
          fi

          echo "Pipeline completed successfully."
